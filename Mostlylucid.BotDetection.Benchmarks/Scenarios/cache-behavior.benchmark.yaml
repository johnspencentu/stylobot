name: CacheBehavior_Normal
description: Cache behavior analysis for normal request
detector: CacheBehavior
request:
  method: GET
  path: /products/123
  ip: 203.0.113.42
  headers:
    user-agent: "Mozilla/5.0 Chrome/120.0"
    cache-control: "max-age=0"
    if-none-match: "W/\"abc123\""
thresholds:
  max_mean_ns: 5000
  max_allocated_bytes: 1024
tags: [fast-path, cache, human]
