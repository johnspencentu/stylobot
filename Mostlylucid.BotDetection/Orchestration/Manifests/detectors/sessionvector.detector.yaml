# Session Vector Detector - Markov-chain-based session behavioral analysis
name: SessionVectorContributor
priority: 30  # After behavioral analysis, before heuristic
enabled: true
description: Compresses per-session request transitions into vectors for anomaly detection

scope:
  sink: botdetection
  coordinator: detection
  atom: sessionvector

taxonomy:
  kind: analyst  # Behavioral pattern analysis
  determinism: statistical
  persistence: ephemeral

input:
  accepts:
    - type: botdetection.request
      required: true
      description: HTTP request for session tracking
      signal_pattern: waveform.*

  required_signals:
    - waveform.signature

  optional_signals:
    - transport.is_streaming
    - transport.is_signalr
    - transport.is_upgrade
    - transport.protocol_class

output:
  produces:
    - type: botdetection.contribution
      description: Session vector analysis contribution

  signals:
    - key: session.request_count
      entity_type: integer
      salience: 0.3
      description: Requests in current session
    - key: session.self_similarity
      entity_type: float
      salience: 0.8
      description: Cosine similarity of current session vs client history
    - key: session.velocity_magnitude
      entity_type: float
      salience: 0.9
      description: Behavioral shift magnitude between sessions

triggers:
  requires:
    - signal: waveform.signature
      description: Needs client signature from behavioral waveform

emits:
  on_start:
    - detector.sessionvector.started

  on_complete:
    - key: session.request_count
      type: int
      description: Current session size

    - key: session.boundary_detected
      type: bool
      description: Whether a session boundary was just detected

  on_failure:
    - detector.sessionvector.failed

lane:
  name: standard
  max_concurrency: 8
  priority: 50

# ============================================
# DEFAULT CONFIGURATION - NO MAGIC NUMBERS
# Override via appsettings.json: BotDetection:Detectors:SessionVectorContributor:*
# ============================================
defaults:
  weights:
    base: 0.0
    bot_signal: 1.5
    human_signal: 1.3

  confidence:
    neutral: 0.0
    bot_detected: 0.5
    human_indicated: -0.2

  timing:
    timeout_ms: 10
    cache_refresh_sec: 0

  features:
    detailed_logging: true
    enable_cache: true
    can_early_exit: false
    can_escalate: false

  parameters:
    # Minimum requests before a session vector is meaningful
    min_session_requests: 5
    # Minimum maturity score to use a session for scoring
    min_maturity_for_scoring: 0.3
    # Velocity magnitude threshold for anomaly detection
    # Higher = less sensitive; lower = more false positives
    velocity_anomaly_threshold: 0.6
    # Cosine similarity below which current session is flagged as dissimilar
    dissimilarity_bot_threshold: 0.3
    # Confidence deltas for various signals
    high_velocity_confidence: 0.5
    dissimilar_session_confidence: 0.4
    consistent_session_human_confidence: -0.2
    stable_velocity_human_confidence: -0.15
    # Session boundary: gap in minutes before a new session starts
    session_gap_minutes: 30
    # Maximum completed session snapshots to retain per signature
    max_snapshots_per_signature: 10
    # Maximum requests tracked per in-progress session
    max_requests_per_session: 200

tags:
  - behavioral
  - session
  - markov
  - vector
  - anomaly-detection
