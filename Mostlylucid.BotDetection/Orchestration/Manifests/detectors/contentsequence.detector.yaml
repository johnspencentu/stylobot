# Content Sequence Detector
name: ContentSequenceContributor
priority: 4
enabled: true
description: Tracks content request sequences and writes signals for deferred detection

scope:
  sink: botdetection
  coordinator: detection
  atom: sequence

taxonomy:
  kind: sequencer
  determinism: deterministic
  persistence: ephemeral

input:
  accepts:
    - type: botdetection.request
      required: true
  required_signals: []
  optional_signals:
    - detection.primary_signature
    - similarity.cluster_id

output:
  signals:
    - key: sequence.position
      entity_type: integer
    - key: sequence.on_track
      entity_type: boolean
    - key: sequence.diverged
      entity_type: boolean
    - key: sequence.divergence_score
      entity_type: number
    - key: sequence.chain_id
      entity_type: string
    - key: sequence.centroid_type
      entity_type: string
    - key: sequence.content_path
      entity_type: string
    - key: sequence.signalr_expected
      entity_type: boolean
    - key: sequence.prefetch_detected
      entity_type: boolean
    - key: sequence.cache_warm
      entity_type: boolean

triggers:
  requires: []
  skip_when: []

lane:
  name: fast
  max_concurrency: 16
  priority: 96

defaults:
  weights:
    base: 0.0
    bot_signal: 0.5
    human_signal: 0.5
    verified: 0.0
    early_exit: 0.0

  confidence:
    neutral: 0.0
    bot_detected: 0.25
    human_indicated: -0.1
    strong_signal: 0.4
    high_threshold: 0.7
    low_threshold: 0.2
    escalation_threshold: 0.0

  timing:
    timeout_ms: 5
    cache_refresh_sec: 0

  features:
    detailed_logging: false
    enable_cache: false
    can_early_exit: false
    can_escalate: false

  parameters:
    deferred_detector_min_position: 3
    divergence_threshold: 0.4
    timing_tolerance_multiplier: 3.0
    min_centroid_sample_size: 20
    session_gap_minutes: 30
    max_tracked_positions: 20

tags:
  - fast-path
  - sequence
  - stage-0
