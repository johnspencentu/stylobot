# Resource Waterfall Detector — document-to-asset ratio analysis
name: ResourceWaterfallContributor
priority: 22
enabled: true
description: >
  Detects scrapers that fetch HTML documents but never load sub-resources.
  Real browsers loading a page will subsequently request CSS, JS, images,
  and fonts. Scrapers that only fetch HTML have zero or very low asset
  ratios, no font loading, and no favicon requests.

scope:
  sink: botdetection
  coordinator: detection
  atom: resourcewaterfall

taxonomy:
  kind: analyst
  determinism: statistical
  persistence: ephemeral

input:
  accepts:
    - type: botdetection.request
      required: true
      description: HTTP request for resource loading pattern analysis
      signal_pattern: transport.*

  required_signals:
    - transport.protocol_class

  optional_signals:
    - signature.primary

output:
  emits:
    - resource.document_count
    - resource.asset_count
    - resource.asset_ratio
    - resource.font_requested
    - resource.favicon_requested

triggers: []

defaults:
  weights:
    BotSignal: 1.4
    HumanSignal: 0.8

  confidence:
    bot_detected: 0.5
    strong_signal: 0.5

  parameters:
    # Minimum document requests before analysis begins
    min_documents_for_analysis: 3
    # Confidence when documents fetched with zero assets
    no_assets_confidence: 0.5
    # Weight multiplier for zero-asset detection
    no_assets_weight: 1.6
    # Asset/document ratio below this is suspicious
    low_ratio_threshold: 0.5
    # Confidence for low ratio detection
    low_ratio_confidence: 0.25
    # Asset/document ratio above this is healthy browser behavior
    healthy_ratio_threshold: 2.0
    # Human confidence for healthy ratio (negative = human signal)
    healthy_ratio_human_confidence: -0.15
    # Confidence for missing font requests
    no_fonts_confidence: 0.1
    # Human confidence for favicon presence (negative = human signal)
    favicon_human_confidence: -0.05
    # Cache expiration for per-signature tracking (minutes)
    cache_expiration_minutes: 30
