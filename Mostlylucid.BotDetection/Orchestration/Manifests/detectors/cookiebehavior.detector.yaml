# Cookie Behavior Detector - tracks cookie acceptance patterns per signature
name: CookieBehaviorContributor
priority: 20
enabled: true
description: >
  Detects bots that ignore Set-Cookie headers. HTTP libraries (Python requests,
  Go net/http, Node axios, curl) typically discard cookies entirely. Real browsers
  always handle cookies and accumulate them over a session. Tracks cookie counts
  per signature - never stores cookie names or values (zero-PII).

scope:
  sink: botdetection
  coordinator: detection
  atom: cookiebehavior

taxonomy:
  kind: analyst
  determinism: statistical
  persistence: ephemeral

input:
  accepts:
    - type: botdetection.request
      required: true
      description: HTTP request for cookie behavior analysis
      signal_pattern: signature.*

  required_signals:
    - signature.primary

  optional_signals: []

output:
  emits:
    - cookie.acceptance_rate
    - cookie.count
    - cookie.ignored

triggers: []

defaults:
  weights:
    BotSignal: 1.5
    HumanSignal: 0.8

  parameters:
    # Minimum requests before cookie analysis kicks in
    min_requests_for_analysis: 3
    # Confidence delta when cookies are ignored (bot signal)
    cookie_ignored_confidence: 0.4
    # Weight multiplier for cookie-ignored bot signal
    cookie_ignored_weight: 1.5
    # Confidence delta when cookies are present and growing (human signal, negative)
    cookie_present_human_confidence: -0.15
    # If true, emit neutral when no Set-Cookie headers observed
    no_set_cookie_neutral: true
    # Cache sliding expiration in minutes
    cache_expiration_minutes: 30