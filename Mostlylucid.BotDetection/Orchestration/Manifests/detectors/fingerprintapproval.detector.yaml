name: FingerprintApprovalContributor
priority: 24
enabled: true
scope: request
description: >
  Checks if the current fingerprint has been manually approved and validates
  locked dimension constraints (country, UA, IP range) against live signals.
  Turns API key access from "key = access" into a behavioral contract:
  a stolen key from a different environment is useless because the fingerprint
  dimensions won't match.

taxonomy:
  category: approval
  subcategory: fingerprint
  threat_model: access_control
  data_sources:
    - fingerprint_approval_store
  false_positive_risk: very_low

input:
  signals: []

output:
  emits:
    - approval.verified
    - approval.status
    - approval.locked_dimensions_ok
    - approval.dimension_mismatch
    - approval.justification
    - approval.expires_at

defaults:
  weights:
    base: 1.0
    bot_signal: 2.0
    human_signal: 2.0
  confidence:
    neutral: 0.0
    bot_detected: 0.3
    human_indicated: -0.4
  parameters:
    # Approval with no locked dimensions still provides a human signal
    unlocked_approval_confidence: -0.4
    # Dimension mismatch confidence boost (positive = bot-indicating)
    dimension_mismatch_confidence: 0.3
    # Weight for dimension mismatch signal
    dimension_mismatch_weight: 2.0
    # Weight for approval human signal
    approval_human_weight: 2.0
