# Similarity Search Detector - HNSW approximate nearest neighbor
name: SimilarityContributor
priority: 60  # After Heuristic (50), before HeuristicLate (100)
enabled: true
description: Uses HNSW approximate nearest neighbor search to find behaviorally similar past signatures

scope:
  sink: botdetection
  coordinator: detection
  atom: similarity

taxonomy:
  kind: analyst
  determinism: statistical
  persistence: ephemeral

input:
  accepts:
    - type: botdetection.request
      required: true
      description: HTTP request with heuristic features

  required_signals:
    - heuristic.prediction

  optional_signals: []

output:
  produces:
    - type: botdetection.contribution
      description: Similarity search contribution

  signals:
    - key: similarity.match_count
      entity_type: integer
      salience: 0.7
      description: Number of similar signatures found
    - key: similarity.top_score
      entity_type: float
      salience: 0.8
      description: Similarity score of best match
    - key: similarity.known_bot
      entity_type: bool
      salience: 0.9
      description: Whether top match was a known bot

triggers:
  requires:
    - signal: heuristic.prediction
      description: Needs heuristic features to build vector

emits:
  on_start:
    - detector.similarity.started
  on_complete:
    - key: similarity.match_count
      type: int
      description: Number of matches
  on_failure:
    - detector.similarity.failed

# ============================================
# DEFAULT CONFIGURATION - NO MAGIC NUMBERS
# Override via appsettings.json: BotDetection:Detectors:SimilarityContributor:*
# ============================================
defaults:
  weights:
    base: 1.0
    bot_signal: 1.4
    human_signal: 1.3
    verified: 1.8

  confidence:
    neutral: 0.0
    bot_detected: 0.3
    human_indicated: -0.2
    strong_signal: 0.6

  timing:
    timeout_ms: 50
    cache_refresh_sec: 0

  features:
    detailed_logging: true
    enable_cache: false
    can_early_exit: false
    can_escalate: false

  parameters:
    # Similarity threshold for bot match
    bot_similarity_threshold: 0.85
    # Similarity threshold for human match
    human_similarity_threshold: 0.85
    # Confidence boost when similar to known bots
    bot_boost_confidence: 0.3
    # Confidence reduction when similar to known humans
    human_reduce_confidence: -0.2
    # Weight for bot similarity match
    bot_match_weight: 1.4
    # Weight for human similarity match
    human_match_weight: 1.3

tags:
  - similarity
  - hnsw
  - nearest-neighbor
