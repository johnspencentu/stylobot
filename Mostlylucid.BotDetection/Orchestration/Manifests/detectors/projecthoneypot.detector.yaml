name: ProjectHoneypot
priority: 15
enabled: true
description: >
  DNS-based threat intelligence lookup via Project Honeypot (httpBL).
  Optional - requires API key configuration. Slow path (~100ms DNS lookup).

scope:
  sink: botdetection
  coordinator: detection
  atom: network

taxonomy:
  kind: lookup
  determinism: deterministic
  persistence: ephemeral

defaults:
  weights:
    BotSignal: 1.5
  confidence:
    bot_detected: 0.7
  timing:
    timeout_ms: 2000