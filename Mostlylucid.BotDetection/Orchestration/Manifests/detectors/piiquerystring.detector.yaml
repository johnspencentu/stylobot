name: PiiQueryString
priority: 8
enabled: true
description: >
  Detects PII patterns in query strings (email, tokens, credentials).
  Privacy contributor — emits informational signals, not bot/human confidence.

scope:
  sink: botdetection
  coordinator: detection
  atom: privacy

taxonomy:
  kind: privacy
  determinism: deterministic
  persistence: ephemeral

defaults:
  weights:
    base: 0.0
  confidence:
    base: 0.0
