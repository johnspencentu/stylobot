# Periodicity Detector — temporal pattern analysis for identity resolution
name: PeriodicityContributor
priority: 25
enabled: true
description: >
  Detects periodic patterns in request timing: fixed-interval polling,
  cron-like schedules, rotation cadence. Periodicity is orthogonal to
  fingerprinting — it survives identity rotation because the rotation
  pattern itself is a detectable signal.

scope:
  sink: botdetection
  coordinator: detection
  atom: periodicity

taxonomy:
  kind: analyst
  determinism: statistical
  persistence: ephemeral

input:
  accepts:
    - type: botdetection.request
      required: true
      description: HTTP request for temporal analysis
      signal_pattern: signature.*

  required_signals:
    - signature.primary

  optional_signals:
    - waveform.timing_regularity_score

output:
  emits:
    - periodicity.cv
    - periodicity.mean_interval
    - periodicity.dominant_period
    - periodicity.peak_strength
    - periodicity.hour_entropy
    - periodicity.temporal_concentration

triggers: []

defaults:
  weights:
    BotSignal: 1.2
    HumanSignal: 0.8

  parameters:
    # Coefficient of variation below this = suspicious regularity
    regularity_bot_threshold: 0.7
    # Confidence for fixed-interval polling detection
    regularity_bot_confidence: 0.35
    # Confidence for cron-like periodic schedule
    cron_pattern_bot_confidence: 0.4
    # Human rhythm confidence (negative = human signal)
    human_rhythm_confidence: -0.15
    # Minimum requests before analysis kicks in
    min_requests: 10
    # Maximum lag for autocorrelation search
    max_lag: 50
