# Behavioral Waveform Detector - Request timing and pattern analysis
name: BehavioralWaveformContributor
priority: 3  # Run late, after individual detectors
enabled: true
description: Analyzes request timing, path traversal, transition patterns, rate, and session behavior

scope:
  sink: botdetection
  coordinator: detection
  atom: behavioralwaveform

taxonomy:
  kind: analyst
  determinism: statistical
  persistence: ephemeral

input:
  accepts:
    - type: botdetection.request
      required: true
      description: HTTP request for behavioral waveform analysis

  required_signals:
    - detection.useragent

  optional_signals:
    - client.mouse_events
    - client.keyboard_events

output:
  produces:
    - type: botdetection.contribution
      description: Behavioral waveform analysis contribution

  signals:
    - key: waveform.interval_mean
      entity_type: float
      salience: 0.5
      description: Mean interval between requests
    - key: waveform.timing_regularity
      entity_type: float
      salience: 0.8
      description: Coefficient of variation of request intervals
    - key: waveform.burst_detected
      entity_type: bool
      salience: 0.9
      description: Whether a burst pattern was detected
    - key: waveform.path_diversity
      entity_type: float
      salience: 0.7
      description: Ratio of unique paths to total requests
    - key: waveform.request_rate
      entity_type: float
      salience: 0.7
      description: Requests per minute

triggers:
  requires:
    - signal: detection.useragent
      description: Needs UA signal from Wave 0

emits:
  on_start:
    - detector.behavioralwaveform.started
  on_complete:
    - key: signature.primary
      type: string
      description: Client signature for waveform tracking
  on_failure:
    - detector.behavioralwaveform.failed

# ============================================
# DEFAULT CONFIGURATION - NO MAGIC NUMBERS
# Override via appsettings.json: BotDetection:Detectors:BehavioralWaveformContributor:*
# ============================================
defaults:
  weights:
    base: 1.0
    bot_signal: 1.5
    human_signal: 1.3
    verified: 2.0

  confidence:
    neutral: 0.0
    bot_detected: 0.5
    human_indicated: -0.15
    strong_signal: 0.8

  timing:
    timeout_ms: 20
    cache_refresh_sec: 0

  features:
    detailed_logging: true
    enable_cache: true
    can_early_exit: false
    can_escalate: false

  parameters:
    # --- Timing pattern thresholds ---
    # Coefficient of variation below which timing is "too regular" (bot-like)
    timing_cv_too_regular: 0.15
    # CV range for human-like timing variation (lower bound)
    timing_cv_human_low: 0.3
    # CV range for human-like timing variation (upper bound)
    timing_cv_human_high: 2.0
    # Minimum intervals required for timing analysis
    timing_min_intervals: 5
    # Confidence delta for too-regular timing
    timing_regular_confidence: 0.7
    # Weight for too-regular timing
    timing_regular_weight: 1.6
    # Confidence delta for human-like timing
    timing_human_confidence: -0.15
    # Weight for human-like timing
    timing_human_weight: 1.3

    # --- Burst detection thresholds ---
    # Time window for burst detection (seconds)
    burst_window_seconds: 10
    # Non-streaming requests in burst window to trigger burst
    burst_threshold: 10
    # Burst confidence delta
    burst_confidence: 0.65
    # Burst weight
    burst_weight: 1.5
    # WebSocket burst threshold (upgrades in burst window)
    ws_burst_threshold: 20
    # WebSocket burst confidence
    ws_burst_confidence: 0.7
    # WebSocket burst weight
    ws_burst_weight: 1.6
    # SSE burst threshold
    sse_burst_threshold: 30
    # SSE burst confidence
    sse_burst_confidence: 0.6
    # SSE burst weight
    sse_burst_weight: 1.5
    # SignalR burst threshold
    signalr_burst_threshold: 40
    # SignalR burst confidence
    signalr_burst_confidence: 0.55
    # SignalR burst weight
    signalr_burst_weight: 1.4

    # --- Path pattern thresholds ---
    # Path diversity below this is considered low (scanning)
    path_diversity_threshold: 0.3
    # Minimum requests for path diversity analysis
    path_diversity_min_requests: 10
    # Low path diversity confidence delta
    path_low_diversity_confidence: 0.3
    # Low path diversity weight
    path_low_diversity_weight: 1.2
    # Sequential pattern confidence delta
    path_sequential_confidence: 0.6
    # Sequential pattern weight
    path_sequential_weight: 1.4
    # Depth-first traversal confidence delta
    path_depth_first_confidence: 0.25
    # Depth-first traversal weight
    path_depth_first_weight: 1.1
    # WebSocket probe confidence delta (multi-endpoint WS upgrades)
    ws_probe_confidence: 0.5
    # WebSocket probe weight
    ws_probe_weight: 1.3
    # Minimum distinct WS endpoints to flag as probing
    ws_probe_min_paths: 3

    # --- Request rate thresholds ---
    # Very high rate threshold (page navigations/min)
    rate_very_high_threshold: 30
    # Elevated rate threshold (page navigations/min)
    rate_elevated_threshold: 10
    # Very high rate confidence delta
    rate_very_high_confidence: 0.75
    # Very high rate weight
    rate_very_high_weight: 1.7
    # Elevated rate confidence delta
    rate_elevated_confidence: 0.3
    # Elevated rate weight
    rate_elevated_weight: 1.3
    # HTTP/2 multiplexing human confidence delta
    rate_multiplex_human_confidence: -0.15
    # HTTP/2 multiplexing weight
    rate_multiplex_weight: 1.2
    # Maximum page rate for multiplexing to be considered normal
    rate_multiplex_max_page_rate: 10
    # WebSocket upgrade rate threshold (per minute)
    ws_rate_threshold: 15
    # WebSocket rate confidence delta
    ws_rate_confidence: 0.6
    # WebSocket rate weight
    ws_rate_weight: 1.4

    # --- Request transition thresholds ---
    # Page-to-page ratio above which = scraper
    transition_page_to_page_threshold: 0.7
    # Minimum page requests for transition analysis
    transition_min_page_requests: 5
    # Scraper-like transition confidence delta
    transition_scraper_confidence: 0.6
    # Scraper-like transition weight
    transition_scraper_weight: 1.5
    # Normal browsing Page->Asset ratio threshold
    transition_normal_page_asset_ratio: 0.5
    # Normal browsing human confidence delta
    transition_normal_confidence: -0.2
    # Normal browsing weight
    transition_normal_weight: 1.3
    # Pure API access confidence delta (no page/asset requests)
    transition_pure_api_confidence: 0.35
    # Pure API access weight
    transition_pure_api_weight: 1.4
    # Minimum API requests for pure-API flag
    transition_pure_api_min: 5

    # --- Session behavior thresholds ---
    # Minimum requests before checking UA changes
    session_ua_change_min_requests: 5
    # UA changed confidence delta
    session_ua_change_confidence: 0.8
    # UA changed weight
    session_ua_change_weight: 1.8
    # Session duration threshold (minutes) for high-speed session
    session_short_duration_minutes: 1
    # Minimum requests for high-speed session
    session_short_duration_min_requests: 10
    # High-speed session confidence delta
    session_short_confidence: 0.7
    # High-speed session weight
    session_short_weight: 1.6

    # --- Interaction pattern thresholds ---
    # No mouse movement confidence delta
    interaction_no_mouse_confidence: 0.4
    # No mouse movement weight
    interaction_no_mouse_weight: 1.5

tags:
  - behavioral
  - waveform
  - timing
  - pattern
