  - pattern: curl
    bot_name: curl
    bot_type: Tool
    vendor: curl project

  - pattern: Wget
    bot_name: wget
    bot_type: Tool
    vendor: GNU

  # === Python HTTP clients ===
  - pattern: python-requests
    bot_name: python-requests
    bot_type: Tool
    vendor: Python

  - pattern: python-urllib
    bot_name: python-urllib
    bot_type: Tool
    vendor: Python

  - pattern: python-httpx
    bot_name: python-httpx
    bot_type: Tool
    vendor: Python

  - pattern: aiohttp
    bot_name: aiohttp
    bot_type: Tool
    vendor: Python

  - pattern: httpie
    bot_name: HTTPie
    bot_type: Tool
    vendor: HTTPie

  # === JVM HTTP clients ===
  - pattern: java/
    bot_name: Java HTTP client
    bot_type: Tool
    vendor: Oracle

  - pattern: apache-httpclient
    bot_name: Apache HttpClient
    bot_type: Tool
    vendor: Apache

  - pattern: okhttp
    bot_name: OkHttp
