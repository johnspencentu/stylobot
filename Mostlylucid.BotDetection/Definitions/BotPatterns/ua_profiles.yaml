# UA Family Behavioral Centroids
# --------------------------------
# SEED VALUES ONLY - these auto-adapt via EWM as real traffic is observed.
# alpha=0.99 means ~100 consistent samples to shift a dimension by 50%.
# Restarting resets to these seeds.
#
# Dimensions:
#   sec_fetch_present : W3C Sec-Fetch-* headers present (modern browsers ~1.0, tools ~0.0)
#   accept_html       : Accept includes text/html (browsers high, raw tools low)
#   accept_language   : Accept-Language header present (browsers high, tools low)
#   accept_encoding   : Accept-Encoding present (most clients, informative)
#   datacenter_ip     : IP is datacenter/VPN (consumer browsers low, crawlers high)
#   reactive_precision: Retry-After compliance ratio near 1.0 (mechanical = high, human = low)
#   reactive_mechanical: Mechanical backoff pattern (exponential/fibonacci/linear = high)
#
# Tier values: browser | crawler | tool | reader | unknown

profiles:
  - family: Chrome
    tier: browser
    aliases:
      - Chrome
      - "Chrome Mobile"
      - "Chrome iOS"
      - Chromium
    dimensions:
      sec_fetch_present: { mean: 0.95, weight: 2.0 }
      accept_html:       { mean: 0.92, weight: 1.0 }
      accept_language:   { mean: 0.97, weight: 1.5 }
      accept_encoding:   { mean: 0.99, weight: 0.5 }
      datacenter_ip:     { mean: 0.04, weight: 1.5 }
      reactive_precision:    { mean: 0.10, weight: 1.0 }
      reactive_mechanical:   { mean: 0.05, weight: 0.8 }

