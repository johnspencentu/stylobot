category: fediverse
description: "Fediverse and ActivityPub decentralised social platform bots. Cannot be verified by IP range (any cloud IP). UA contains platform name and instance domain (e.g. Mastodon/4.2.0 (compatible; +https://mastodon.social/)). Pattern match alone is reliable enough for identification."
patterns:
  - pattern: Mastodon
    bot_name: Mastodon
    bot_type: SocialMediaBot
    vendor: Mastodon

