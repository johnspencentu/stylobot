name: Publish to Chocolatey

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 5.6.9)'
        required: false

jobs:
  publish:
    # Only run on console-v* releases, skip prereleases (betas don't go to Chocolatey)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' &&
       startsWith(github.event.release.tag_name, 'console-v') &&
       github.event.release.prerelease == false)
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Find version
      id: version
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_TAG: ${{ github.event.release.tag_name }}
      shell: bash
      run: |
        if [ -n "$INPUT_VERSION" ]; then
          VERSION="$INPUT_VERSION"
        elif [ -n "$RELEASE_TAG" ]; then
          VERSION="${RELEASE_TAG#console-v}"
        else
          TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 20 --json tagName,isPrerelease \
            | jq -r '[.[] | select(.tagName | startswith("console-v")) | select(.isPrerelease == false)][0].tagName')
          VERSION="${TAG#console-v}"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Publishing Chocolatey package v$VERSION"

    - name: Download SHA256SUMS
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ steps.version.outputs.version }}
      shell: bash
      run: |
        gh release download "console-v${VERSION}" \
          --repo "$GITHUB_REPOSITORY" \
          --pattern "SHA256SUMS.txt"

    - name: Update version and checksum
      env:
        VERSION: ${{ steps.version.outputs.version }}
      shell: pwsh
      run: |
        $sha = (Get-Content SHA256SUMS.txt | Select-String 'stylobot-win-x64.zip').ToString().Split(' ')[0]
        Write-Host "Windows x64 SHA256: $sha"

        $nuspec = Get-Content scripts/chocolatey/stylobot.nuspec -Raw
        $nuspec = $nuspec -replace '<version>.*</version>', "<version>$env:VERSION</version>"
        Set-Content scripts/chocolatey/stylobot.nuspec $nuspec

        $install = Get-Content scripts/chocolatey/tools/chocolateyInstall.ps1 -Raw
        $install = $install -replace "checksum       = '.*'", "checksum       = '$sha'"
        Set-Content scripts/chocolatey/tools/chocolateyInstall.ps1 $install

    - name: Pack
      shell: pwsh
      run: |
        cd scripts/chocolatey
        choco pack stylobot.nuspec
        Get-ChildItem *.nupkg

    - name: Push
      env:
        VERSION: ${{ steps.version.outputs.version }}
        CHOCO_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
      shell: pwsh
      run: |
        if (-not $env:CHOCO_API_KEY) {
          Write-Host "CHOCOLATEY_API_KEY not set, skipping"
          exit 0
        }
        cd scripts/chocolatey
        choco push "stylobot.$env:VERSION.nupkg" --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
