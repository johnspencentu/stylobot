name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (e.g., 5.6.8)'
        required: false

jobs:
  update-formula:
    # Only run on console-v* releases, skip prereleases (betas don't go to Homebrew)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' &&
       startsWith(github.event.release.tag_name, 'console-v') &&
       github.event.release.prerelease == false)
    runs-on: ubuntu-latest
    steps:
    - name: Find version
      id: release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        INPUT_VERSION: ${{ inputs.version }}
        RELEASE_TAG: ${{ github.event.release.tag_name }}
      run: |
        if [ -n "$INPUT_VERSION" ]; then
          TAG="console-v${INPUT_VERSION}"
          VERSION="$INPUT_VERSION"
        elif [ -n "$RELEASE_TAG" ]; then
          TAG="$RELEASE_TAG"
          VERSION="${TAG#console-v}"
        else
          # Find latest stable console release
          TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 20 --json tagName,isPrerelease \
            | jq -r '[.[] | select(.tagName | startswith("console-v")) | select(.isPrerelease == false)][0].tagName')
          VERSION="${TAG#console-v}"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Updating Homebrew formula to v$VERSION (tag: $TAG)"

    - name: Download SHA256SUMS
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ steps.release.outputs.tag }}
      run: |
        gh release download "$TAG" \
          --repo "$GITHUB_REPOSITORY" \
          --pattern "SHA256SUMS.txt" \
          --output SHA256SUMS.txt
        cat SHA256SUMS.txt

    - name: Extract hashes
      id: hashes
      run: |
        echo "osx_arm64=$(grep 'stylobot-osx-arm64.tar.gz' SHA256SUMS.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
        echo "osx_x64=$(grep 'stylobot-osx-x64.tar.gz' SHA256SUMS.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
        echo "linux_arm64=$(grep 'stylobot-linux-arm64.tar.gz' SHA256SUMS.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
        echo "linux_x64=$(grep 'stylobot-linux-x64.tar.gz' SHA256SUMS.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"

    - name: Checkout tap
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        repository: scottgal/homebrew-stylobot
        token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        path: homebrew-tap

    - name: Update formula
      env:
        VERSION: ${{ steps.release.outputs.version }}
        SHA_OSX_ARM64: ${{ steps.hashes.outputs.osx_arm64 }}
        SHA_OSX_X64: ${{ steps.hashes.outputs.osx_x64 }}
        SHA_LINUX_ARM64: ${{ steps.hashes.outputs.linux_arm64 }}
        SHA_LINUX_X64: ${{ steps.hashes.outputs.linux_x64 }}
      run: |
        cd homebrew-tap
        sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/stylobot.rb
        sed -i "/stylobot-osx-arm64/,/sha256/{s/sha256 \".*\"/sha256 \"${SHA_OSX_ARM64}\"/}" Formula/stylobot.rb
        sed -i "/stylobot-osx-x64/,/sha256/{s/sha256 \".*\"/sha256 \"${SHA_OSX_X64}\"/}" Formula/stylobot.rb
        sed -i "/stylobot-linux-arm64/,/sha256/{s/sha256 \".*\"/sha256 \"${SHA_LINUX_ARM64}\"/}" Formula/stylobot.rb
        sed -i "/stylobot-linux-x64/,/sha256/{s/sha256 \".*\"/sha256 \"${SHA_LINUX_X64}\"/}" Formula/stylobot.rb
        cat Formula/stylobot.rb

    - name: Push
      working-directory: homebrew-tap
      env:
        VERSION: ${{ steps.release.outputs.version }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/stylobot.rb
        git diff --cached --quiet && echo "No changes" && exit 0
        git commit -m "Bump to v${VERSION}"
        git push
