name: Update Homebrew Formula

on:
  # Triggers when the Publish All workflow completes (any job)
  workflow_run:
    workflows: ["Publish All"]
    types: [completed]
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  update-formula:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
    - name: Find latest console release
      id: release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Get the latest console-v* release
        TAG=$(gh release list --repo "${{ github.repository }}" --limit 20 --json tagName \
          | jq -r '[.[] | select(.tagName | startswith("console-v"))][0].tagName')
        VERSION="${TAG#console-v}"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Found release: $TAG (v$VERSION)"

    - name: Download SHA256SUMS from release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ steps.release.outputs.tag }}
      run: |
        gh release download "$TAG" \
          --repo "${{ github.repository }}" \
          --pattern "SHA256SUMS.txt" \
          --output SHA256SUMS.txt
        cat SHA256SUMS.txt

    - name: Extract platform hashes
      id: hashes
      run: |
        echo "osx_arm64=$(grep 'stylobot-osx-arm64.tar.gz' SHA256SUMS.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
        echo "osx_x64=$(grep 'stylobot-osx-x64.tar.gz' SHA256SUMS.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
        echo "linux_arm64=$(grep 'stylobot-linux-arm64.tar.gz' SHA256SUMS.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
        echo "linux_x64=$(grep 'stylobot-linux-x64.tar.gz' SHA256SUMS.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"

    - name: Checkout Homebrew tap
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        repository: scottgal/homebrew-stylobot
        token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        path: homebrew-tap

    - name: Update formula
      env:
        VERSION: ${{ steps.release.outputs.version }}
        SHA_OSX_ARM64: ${{ steps.hashes.outputs.osx_arm64 }}
        SHA_OSX_X64: ${{ steps.hashes.outputs.osx_x64 }}
        SHA_LINUX_ARM64: ${{ steps.hashes.outputs.linux_arm64 }}
        SHA_LINUX_X64: ${{ steps.hashes.outputs.linux_x64 }}
      run: |
        cd homebrew-tap
        sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/stylobot.rb
        sed -i "/stylobot-osx-arm64/,/sha256/{s/sha256 \".*\"/sha256 \"${SHA_OSX_ARM64}\"/}" Formula/stylobot.rb
        sed -i "/stylobot-osx-x64/,/sha256/{s/sha256 \".*\"/sha256 \"${SHA_OSX_X64}\"/}" Formula/stylobot.rb
        sed -i "/stylobot-linux-arm64/,/sha256/{s/sha256 \".*\"/sha256 \"${SHA_LINUX_ARM64}\"/}" Formula/stylobot.rb
        sed -i "/stylobot-linux-x64/,/sha256/{s/sha256 \".*\"/sha256 \"${SHA_LINUX_X64}\"/}" Formula/stylobot.rb
        echo "Updated formula:"
        cat Formula/stylobot.rb

    - name: Commit and push
      working-directory: homebrew-tap
      env:
        VERSION: ${{ steps.release.outputs.version }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/stylobot.rb
        git diff --cached --quiet && echo "No changes to commit" && exit 0
        git commit -m "Bump to v${VERSION}"
        git push
