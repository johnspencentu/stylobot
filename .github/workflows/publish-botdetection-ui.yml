name: Publish Mostlylucid.BotDetection.UI

on:
  push:
    tags:
      - 'allbot-v*.*.*'
      - 'ui-v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Mostlylucid.BotDetection.UI/Mostlylucid.BotDetection.UI.csproj

    - name: Build
      run: dotnet build Mostlylucid.BotDetection.UI/Mostlylucid.BotDetection.UI.csproj -c Release --no-restore

    - name: Pack
      run: dotnet pack Mostlylucid.BotDetection.UI/Mostlylucid.BotDetection.UI.csproj -c Release --no-build -o ./artifacts

    - name: Login to NuGet (OIDC)
      uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1
      id: nuget_login
      with:
        user: 'mostlylucid'

    - name: Push to NuGet
      env:
        NUGET_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
      run: dotnet nuget push ./artifacts/*.nupkg --api-key "$NUGET_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
